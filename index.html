<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MONITORAMENTO LH — SPA1</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* ── CSS Variables ──────────────────────────────────────────────── */
:root {
  --accent:      #ff6600;
  --accent-dark: #cc4400;
  --accent-glow: rgba(255,102,0,.22);

  --st-concluida:#16a34a; --st-concluida-bg:#dcfce7; --st-concluida-text:#14532d;
  --st-descarga: #ca8a04; --st-descarga-bg: #fef9c3; --st-descarga-text: #713f12;
  --st-docada:   #b91c1c; --st-docada-bg:   #fee2e2; --st-docada-text:   #7f1d1d;
  --st-fos:      #1d4ed8; --st-fos-bg:      #dbeafe; --st-fos-text:      #1e3a8a;
  --st-naochegou:#ea580c; --st-naochegou-bg:#ffedd5; --st-naochegou-text:#7c2d12;
  --st-aguardando:#6b7280;--st-aguardando-bg:#f3f4f6;--st-aguardando-text:#374151;
  --st-bloqueada:#7c3aed; --st-bloqueada-bg: #ede9fe;--st-bloqueada-text:#4c1d95;
}

[data-theme="dark"] {
  --bg:     #0f1117;
  --bg2:    #1a1d27;
  --bg3:    #22263a;
  --bg4:    #2a2f45;
  --border: rgba(255,255,255,.08);
  --text:   #e8eaf0;
  --text2:  #9aa0b8;
  --text3:  #6b7280;
  --shadow: 0 2px 12px rgba(0,0,0,.4);
  --shadow-lg:0 8px 32px rgba(0,0,0,.5);
  --header-bg:linear-gradient(135deg,#ff6600 0%,#b83200 100%);

  --st-concluida-bg: #14532d; --st-concluida-text:#bbf7d0;
  --st-descarga-bg:  #713f12; --st-descarga-text: #fef08a;
  --st-docada-bg:    #7f1d1d; --st-docada-text:   #fecaca;
  --st-fos-bg:       #1e3a8a; --st-fos-text:      #bfdbfe;
  --st-naochegou-bg: #7c2d12; --st-naochegou-text:#fed7aa;
  --st-aguardando-bg:#374151; --st-aguardando-text:#e5e7eb;
  --st-bloqueada-bg: #4c1d95; --st-bloqueada-text:#ddd6fe;
}

[data-theme="light"] {
  --bg:     #f1f3f8;
  --bg2:    #ffffff;
  --bg3:    #f8f9fc;
  --bg4:    #eef0f6;
  --border: rgba(0,0,0,.08);
  --text:   #1a1d27;
  --text2:  #555b72;
  --text3:  #9aa0b8;
  --shadow: 0 2px 8px rgba(0,0,0,.08);
  --shadow-lg:0 8px 24px rgba(0,0,0,.12);
  --header-bg:linear-gradient(135deg,#ff6600 0%,#cc3300 100%);
}

/* ── Reset ──────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Barlow',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:14px;
  transition:background .3s,color .3s;
}
/* Smooth theme transition on all key elements */
.topbar,.card,.table-wrap,.sync-badge,.theme-toggle,
#uploadStatus,.file-label,.date-group,#datePicker,
tbody td,td select,#toast{
  transition:background .3s,color .3s,border-color .3s,box-shadow .3s;
}

/* ── App wrapper ────────────────────────────────────────────────── */
.app{max-width:1400px;margin:0 auto;padding:12px}

/* ── Header (dentro do print) ───────────────────────────────────── */
.header{
  background:var(--header-bg);
  color:#fff;
  border-radius:14px;
  padding:14px 18px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 20px var(--accent-glow);
}
.header-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(16px,4vw,26px);
  font-weight:900;
  letter-spacing:1.5px;
  text-transform:uppercase;
  line-height:1.1;
  text-align:center;
}
.header-title small{font-weight:400;opacity:.75;font-size:.65em;display:block;letter-spacing:.5px}

/* ── Analyst badge ──────────────────────────────────────────────── */
.analyst{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:8px;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.25);
  border-radius:20px;
  padding:3px 12px 3px 8px;
  font-size:11px;font-weight:600;letter-spacing:.3px;
  color:rgba(255,255,255,.9);
}
.analyst-dot{
  width:6px;height:6px;border-radius:50%;
  background:#4ade80;box-shadow:0 0 6px #4ade80;
}
.theme-toggle{
  background:var(--bg4);
  border:1px solid var(--border);
  color:var(--text);
  width:36px;height:36px;
  border-radius:50%;
  cursor:pointer;
  font-size:17px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .2s;
  flex-shrink:0;
}
.theme-toggle:hover{background:var(--bg3);transform:rotate(18deg)}

/* ── Sync badge ─────────────────────────────────────────────────── */
.sync-badge{
  display:flex;align-items:center;gap:5px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:20px;padding:4px 10px;
  font-size:11px;font-weight:600;color:var(--text2);
  white-space:nowrap;
}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pg 2s infinite}
.sync-dot.err{background:#f87171;animation:none}
.sync-dot.loading{background:#fbbf24;animation:py 1s infinite}
@keyframes pg{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes py{0%,100%{opacity:1}50%{opacity:.25}}

/* ── KPI cards ──────────────────────────────────────────────────── */
.dashboard{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  margin-bottom:12px;
}
.card{
  background:var(--bg2);
  border-radius:12px;
  padding:14px 10px;
  text-align:center;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
  transition:transform .15s,box-shadow .15s;
}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:4px}
.card-value{font-family:'Barlow Condensed',sans-serif;font-size:clamp(26px,5vw,40px);font-weight:900;line-height:1}
.card-total   .card-value{color:var(--accent)}
.card-ok      .card-value{color:var(--st-concluida)}
.card-desc    .card-value{color:var(--st-descarga)}
.card-nc      .card-value{color:var(--st-naochegou)}
.card-pkg     .card-value{color:#0ea5e9}

/* ── Top bar (controles — fora do print) ────────────────────────── */
.topbar{
  background:var(--bg2);
  border-radius:12px;
  padding:8px 12px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:8px;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.file-label{
  display:flex;align-items:center;gap:6px;
  background:var(--bg3);
  border:1.5px dashed var(--border);
  border-radius:8px;padding:7px 12px;
  cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);
  flex:1;min-width:150px;
  transition:border-color .2s,color .2s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.file-label:hover{border-color:var(--accent);color:var(--accent)}
.file-label input{display:none}
.date-group{
  display:flex;align-items:center;gap:6px;
  background:var(--bg3);border-radius:8px;padding:6px 10px;
  border:1px solid var(--border);
}
.date-group label{font-size:11px;font-weight:700;color:var(--text2);white-space:nowrap}
#datePicker{
  border:none;background:transparent;color:var(--text);
  font-size:13px;font-family:'Barlow',sans-serif;font-weight:600;
  cursor:pointer;outline:none;
}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}
.btn{
  border:none;padding:8px 14px;border-radius:8px;
  font-family:'Barlow',sans-serif;font-weight:700;font-size:12px;
  cursor:pointer;white-space:nowrap;
  transition:filter .15s,transform .1s;
  display:flex;align-items:center;gap:5px;
}
.btn:hover{filter:brightness(1.1)}
.btn:active{transform:scale(.97)}
.btn-upload{background:var(--accent);color:#fff}
.btn-print {background:#16a34a;color:#fff}
.btn-clear {background:#dc2626;color:#fff}
#uploadStatus{
  font-size:11px;font-weight:600;padding:4px 8px;
  border-radius:6px;background:var(--bg3);color:var(--text2);
  border:1px solid var(--border);
  white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis;
}

/* ── Table ──────────────────────────────────────────────────────── */
.table-wrap{
  background:var(--bg2);border-radius:14px;
  box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;
}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
table{
  width:100%;border-collapse:collapse;
  table-layout:fixed; /* ← colunas respeitam widths definidos */
}
/* Larguras das 10 colunas: #, DOCA, REV-BTN, PLACA, IN, OUT, PKG, STATUS, PERFIL */
col.c-num    {width:3%}
col.c-doca   {width:8%}
col.c-rev    {width:9%}
col.c-placa  {width:11%}
col.c-in     {width:6%}
col.c-out    {width:6%}
col.c-pkg    {width:7%}
col.c-status {width:26%}
col.c-perfil {width:14%}

thead th{
  background:var(--accent);color:#fff;
  padding:8px 3px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-align:center;
  position:sticky;top:0;z-index:2;
}
tbody tr{transition:background .15s}
tbody td{
  padding:5px 3px;border-bottom:1px solid var(--border);
  text-align:center;font-size:11px;color:var(--text);vertical-align:middle;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-weight:700;
}
tbody tr:last-child td{border-bottom:none}

/* ── Status: cor SOMENTE na celula td.td-status ─────────────────── */
tbody td{font-weight:700;color:var(--text)}

td.td-status{
  padding:3px 4px;font-weight:800;
  /* sem border-radius aqui — o select interno já estiliza */
}

tr.st-Concluida  td.td-status{background:var(--st-concluida-bg);color:var(--st-concluida-text)}
tr.st-Descarga   td.td-status{background:var(--st-descarga-bg); color:var(--st-descarga-text)}
tr.st-Docada     td.td-status{background:var(--st-docada-bg);   color:var(--st-docada-text)}
tr.st-Fos        td.td-status{background:var(--st-fos-bg);      color:var(--st-fos-text)}
tr.st-NaoChegou  td.td-status{background:var(--st-naochegou-bg);color:var(--st-naochegou-text)}
tr.st-Aguardando td.td-status{background:var(--st-aguardando-bg);color:var(--st-aguardando-text)}
tr.st-Bloqueada  td.td-status{background:var(--st-bloqueada-bg);color:var(--st-bloqueada-text)}

/* ── Botão de Reversa ───────────────────────────────────────────── */
.btn-reversa{
  display:flex;align-items:center;justify-content:center;
  width:100%;border:1.5px solid var(--border);border-radius:6px;
  padding:4px 3px;cursor:pointer;
  background:var(--bg2);color:var(--text2);
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;
  letter-spacing:.3px;
  transition:background .15s,border-color .15s,color .15s;
  white-space:nowrap;
}
.btn-reversa:hover{border-color:var(--accent);color:var(--accent)}
.btn-reversa:not(.active){font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;opacity:.7}
.btn-reversa.active{background:#7c3aed;border-color:#6d28d9;color:#fff;}

/* ── Toggle MP / PCT abaixo da placa ────────────────────────────── */
.reversa-toggles{
  display:flex;gap:2px;margin-top:2px;justify-content:center;
}
.rtgl{
  font-size:7px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;
  padding:1px 5px;border-radius:8px;cursor:pointer;border:1px solid var(--border);
  background:var(--bg3);color:var(--text3);
  transition:background .12s,color .12s,border-color .12s;
  white-space:nowrap;line-height:1.4;
  -webkit-tap-highlight-color:transparent;
}
.rtgl:hover{border-color:var(--text2);color:var(--text2)}
.rtgl.on.mp  {background:#7c3aed;color:#fff;border-color:#6d28d9}
.rtgl.on.pkg {background:#0369a1;color:#fff;border-color:#075985}

/* ── Placa + tag de reversa ─────────────────────────────────────── */
.placa-wrap{display:flex;flex-direction:column;align-items:center;gap:1px}
.placa{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:12px;letter-spacing:.2px;white-space:nowrap;
}
.reversa-tag{
  display:inline-flex;align-items:center;gap:3px;
  font-size:8px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;
  padding:2px 6px;border-radius:10px;white-space:nowrap;flex-shrink:0;
}
.reversa-tag.mp  {background:#7c3aed;color:#fff}
.reversa-tag.pkg {background:#0369a1;color:#fff}

/* ── Forçar centralização em DOCA, STATUS, PERFIL ───────────────── */
td.td-doca, td.td-status, td.td-perfil { text-align:center !important; }
td.td-doca select, td.td-perfil select, td.td-status select {
  text-align:center; text-align-last:center;
}
td.td-rev { overflow:visible; padding:3px 2px; vertical-align:middle; }
td.td-placa { overflow:visible; white-space:normal; }

/* ── Selects dentro da tabela ───────────────────────────────────── */
td select{
  border:1px solid var(--border);
  border-radius:4px;
  padding:2px 1px;
  font-size:10px;font-family:'Barlow',sans-serif;font-weight:600;
  cursor:pointer;
  background:var(--bg2);
  color:var(--text);
  outline:none;
  width:100%;max-width:100%;
  display:block;
  transition:box-shadow .15s;
  -webkit-appearance:auto;appearance:auto;
  text-overflow:ellipsis;overflow:hidden;
}
td select:focus{box-shadow:0 0 0 2px var(--accent);outline:none}
/* Select dentro da célula de status herda cor do status */
td.td-status select{
  background:transparent;color:inherit;
  border-color:rgba(0,0,0,.15);font-weight:700;
  border-radius:6px;
}
#printArea{background:var(--bg);border-radius:0;padding:0}

/* Subtle zebra striping since rows no longer carry status BG */
tbody tr:nth-child(even) td{background:var(--bg3)}
tbody tr:nth-child(odd)  td{background:var(--bg2)}
tbody tr:hover td{background:var(--bg4) !important}
@keyframes saved-flash{
  0%  {outline:2px solid #4ade80;outline-offset:1px}
  100%{outline:2px solid transparent}
}
.saved{animation:saved-flash .7s ease-out}

/* ── Empty state ────────────────────────────────────────────────── */
.empty-msg{padding:36px 20px;color:var(--text3);font-size:14px;text-align:center;line-height:2}
.empty-msg strong{color:var(--text2)}

/* ── Overlay ────────────────────────────────────────────────────── */
#overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  z-index:999;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;color:#fff;font-size:16px;font-weight:700;
}
#overlay.show{display:flex}
.spin{
  width:48px;height:48px;
  border:4px solid rgba(255,255,255,.2);
  border-top-color:var(--accent);
  border-radius:50%;animation:rot .7s linear infinite;
}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── Toast ──────────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:20px;right:16px;
  background:var(--bg2);color:var(--text);border-radius:10px;
  padding:10px 16px;font-size:13px;font-weight:600;
  box-shadow:var(--shadow-lg);
  transform:translateY(80px);opacity:0;
  transition:transform .3s,opacity .3s,background .3s,color .3s;
  z-index:1000;max-width:280px;
  display:flex;align-items:center;gap:8px;
  border:1px solid var(--border);
  border-left:4px solid var(--accent);
}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok {border-left-color:#4ade80}
#toast.err{border-left-color:#f87171}

/* ── Responsive ─────────────────────────────────────────────────── */
@media(max-width:640px){
  .app{padding:6px}
  .dashboard{grid-template-columns:repeat(2,1fr);gap:8px}
  .topbar{flex-direction:column;align-items:stretch}
  .topbar-right{margin-left:0;justify-content:flex-end}
  .file-label{justify-content:center}
  .date-group{justify-content:center}
  .btn-group{justify-content:center}
  .header-title small{display:none}
  thead th{font-size:9px;padding:7px 2px;letter-spacing:0}
  tbody td{font-size:10px;padding:4px 2px}
  td select{font-size:9px;padding:1px 1px}
  .placa{font-size:11px}
}
@media(max-width:380px){
  .sync-badge{display:none}
  .card-label{font-size:9px}
}
</style>
</head>
<body>

<div id="overlay"><div class="spin"></div><span id="overlayMsg">Carregando…</span></div>
<div id="toast"><span id="toastMsg">Salvo</span></div>

<div class="app">

  <!-- TOP BAR: controles + status + sync/tema -->
  <div class="topbar">
    <label class="file-label">
      📂 <span id="fileName">Selecionar CSV / XLSX…</span>
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
    </label>

    <div class="date-group">
      <label>📅</label>
      <input type="date" id="datePicker">
    </div>

    <div class="btn-group">
      <button id="btnUpload" class="btn btn-upload">⬆ Enviar</button>
      <button id="btnPrint"  class="btn btn-print">📸</button>
      <button id="btnClear"  class="btn btn-clear">🗑</button>
    </div>

    <span id="uploadStatus">—</span>

    <div class="topbar-right">
      <div class="sync-badge">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncLabel">Online</span>
      </div>
      <button class="theme-toggle" id="btnTheme" title="Alternar tema">🌙</button>
    </div>
  </div>

  <!-- HEADER + KPI (área do print) -->
  <div id="printArea">

    <!-- Header -->
    <div class="header">
      <div class="header-title">
        🚛 Monitoramento LH SPA1
        <small></small>
        <span class="analyst"><span class="analyst-dot"></span>Analista: Ezequiel Miranda</span>
      </div>
    </div>

    <!-- KPI Cards -->
    <div class="dashboard">
      <div class="card card-total">
        <div class="card-label">Total</div>
        <div class="card-value" id="kpiTotal">0</div>
      </div>
      <div class="card card-ok">
        <div class="card-label">Concluídas</div>
        <div class="card-value" id="kpiConcluida">0</div>
      </div>
      <div class="card card-desc">
        <div class="card-label">Descarga Iniciada</div>
        <div class="card-value" id="kpiDescarga">0</div>
      </div>
      <div class="card card-nc">
        <div class="card-label">Não Chegou</div>
        <div class="card-value" id="kpiNaoChegou">0</div>
      </div>
      <div class="card card-pkg">
        <div class="card-label">Total Pacotes</div>
        <div class="card-value" id="kpiPacotes">0</div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <colgroup>
            <col class="c-num"><col class="c-doca"><col class="c-rev">
            <col class="c-placa"><col class="c-in"><col class="c-out">
            <col class="c-pkg"><col class="c-status"><col class="c-perfil">
          </colgroup>
          <thead>
            <tr>
              <th>#</th><th>DOCA</th><th>HR INICIO</th><th>PLACA</th>
              <th>YMS IN</th><th>YMS OUT</th><th>PACOTES</th>
              <th>STATUS</th><th>PERFIL</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="9" class="empty-msg">Carregando dados…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div><!-- #printArea -->

</div><!-- .app -->

<script>
// ── Config ──────────────────────────────────────────────────────────
const RTDB         = "https://monitoramento-rotas-spa1-default-rtdb.firebaseio.com"
const CHUNK        = 200
const POLL_MS      = 10000

// ── State ────────────────────────────────────────────────────────────
let allRows = [], filtered = [], manualMap = {}
let selectedDate    = todayStr()
let pollTimer       = null
let toastTimer      = null
let lastManualHash  = ""

// ── DOM ──────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id)

// ── Theme ────────────────────────────────────────────────────────────
const saved = localStorage.getItem("lh-theme") || "dark"
document.documentElement.setAttribute("data-theme", saved)
$("btnTheme").textContent = saved === "dark" ? "☀️" : "🌙"

$("btnTheme").addEventListener("click", () => {
  const t = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark"
  document.documentElement.setAttribute("data-theme", t)
  $("btnTheme").textContent = t === "dark" ? "☀️" : "🌙"
  localStorage.setItem("lh-theme", t)
})

// ── Event listeners ──────────────────────────────────────────────────
$("datePicker").value = selectedDate
$("btnUpload").addEventListener("click",   handleUpload)
$("btnPrint").addEventListener ("click",   exportImg)
$("btnClear").addEventListener ("click",   clearAll)
$("datePicker").addEventListener("change", applyFilter)

// File chosen → show table IMMEDIATELY, then optionally cloud upload
$("fileInput").addEventListener("change", e => {
  const f = e.target.files[0]
  if (!f) return
  $("fileName").textContent = f.name
  const name = f.name.toLowerCase()
  if (name.endsWith(".xlsx") || name.endsWith(".xls")) readXLSX(f, false)
  else readCSV(f, false)
})

// Table select changes → save to cloud instantly
$("tbody").addEventListener("change", async e => {
  const { id, field } = e.target.dataset
  if (!id || !field) return
  const val = e.target.value

  if (!manualMap[id]) manualMap[id] = { doca:"-", status_patio:"Não Chegou", perfil:"Granel", reversa_hora:"", reversa_tipo:"—" }
  manualMap[id][field] = val
  render()

  // Flash green on row
  const row = e.target.closest("tr")
  if (row) { row.classList.remove("saved"); void row.offsetWidth; row.classList.add("saved") }

  setSyncStatus("loading", "Salvando…")
  try {
    await rtdbPatch(`lh_monitoramento/${encodeKey(id)}`, {
      route_id: id, [field]: val, updated_at: new Date().toISOString()
    })
    setSyncStatus("ok", "Online")
    showToast("✅ Salvo na nuvem", "ok")
  } catch(err) {
    setSyncStatus("err", "Erro")
    showToast("❌ Erro ao salvar", "err")
    console.error(err)
  }
})

// Reversa button click → register or clear time
$("tbody").addEventListener("click", async e => {
  // ── HR INICIO button ──────────────────────────────────────────────
  const btn = e.target.closest(".btn-reversa")
  if (btn) {
    const id = btn.dataset.id
    if (!id) return
    if (!manualMap[id]) manualMap[id] = { doca:"-", status_patio:"Não Chegou", perfil:"Granel", reversa_hora:"", reversa_tipo:"—" }
    const already = manualMap[id].reversa_hora
    const newTime = already ? "" : new Date().toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"})
    manualMap[id].reversa_hora = newTime
    render()
    const row = btn.closest("tr")
    if (row) { row.classList.remove("saved"); void row.offsetWidth; row.classList.add("saved") }
    setSyncStatus("loading", "Salvando…")
    try {
      await rtdbPatch(`lh_monitoramento/${encodeKey(id)}`, { route_id:id, reversa_hora:newTime, updated_at:new Date().toISOString() })
      setSyncStatus("ok", "Online")
      showToast(newTime ? `⏱ Início: ${newTime}` : "🗑 Hora apagada", "ok")
    } catch(err) { setSyncStatus("err","Erro"); showToast("❌ Erro ao salvar","err"); console.error(err) }
    return
  }

  // ── Reversa type toggle (MP / PCT) ───────────────────────────────
  const tgl = e.target.closest(".rtgl")
  if (tgl) {
    const id    = tgl.dataset.id
    const rtype = tgl.dataset.rtype
    if (!id) return
    if (!manualMap[id]) manualMap[id] = { doca:"-", status_patio:"Não Chegou", perfil:"Granel", reversa_hora:"", reversa_tipo:"—" }
    // Toggle: clique no mesmo → desmarca; clique em outro → marca
    const cur = manualMap[id].reversa_tipo || "—"
    const newType = cur === rtype ? "—" : rtype
    manualMap[id].reversa_tipo = newType
    render()
    const row = tgl.closest("tr")
    if (row) { row.classList.remove("saved"); void row.offsetWidth; row.classList.add("saved") }
    setSyncStatus("loading", "Salvando…")
    try {
      await rtdbPatch(`lh_monitoramento/${encodeKey(id)}`, { route_id:id, reversa_tipo:newType, updated_at:new Date().toISOString() })
      setSyncStatus("ok", "Online")
      showToast(newType !== "—" ? `✅ ${newType}` : "✅ Tipo removido", "ok")
    } catch(err) { setSyncStatus("err","Erro"); showToast("❌ Erro ao salvar","err"); console.error(err) }
  }
})

// ── Bootstrap ────────────────────────────────────────────────────────
;(async () => {
  try {
    loading("Carregando dados da nuvem…")
    await loadCloudCSV()
    await loadManual()
    applyFilter()
    done()

// ── Utilities ────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date()
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`
}
function loading(msg) { $("overlayMsg").textContent = msg||"Carregando…"; $("overlay").classList.add("show") }
function done()       { $("overlay").classList.remove("show") }
function setStatus(msg, color) { $("uploadStatus").textContent = msg; $("uploadStatus").style.color = color||"" }
function v(obj, key)  { const r = obj[key]; return r == null ? "" : String(r).trim() }
function encodeKey(id){ return String(id).replace(/[.#$[\]/]/g,"_") }
function hhmm(dt) {
  const s = String(dt||""), m = s.match(/(\d{2}:\d{2})/)
  return m ? m[1] : "—"
}
function setSyncStatus(state, label) {
  const d = $("syncDot")
  d.className = "sync-dot" + (state==="err"?" err":state==="loading"?" loading":"")
  $("syncLabel").textContent = label
}
function showToast(msg, type="") {
  const t = $("toast")
  $("toastMsg").textContent = msg
  t.className = "show " + type
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => { t.className = "" }, 2600)
}
function normalizeDate(raw) {
  if (!raw && raw !== 0) return ""
  const s = String(raw).trim()
  if (!s || s === "nan") return ""
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.replace("T"," ")
  const dmy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:[T\s]+(\d{1,2}:\d{2}))?/)
  if (dmy) {
    const [,d,m,y,t] = dmy
    return `${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}` + (t ? " "+t+":00" : " 00:00:00")
  }
  if (/^\d+(\.\d+)?$/.test(s) && typeof XLSX!=="undefined") {
    try {
      const dt = XLSX.SSF.parse_date_code(parseFloat(s))
      if (dt) return `${dt.y}-${String(dt.m).padStart(2,"0")}-${String(dt.d).padStart(2,"0")} ${String(dt.H).padStart(2,"0")}:${String(dt.M).padStart(2,"0")}:00`
    } catch(e) {}
  }
  return s
}

// ── RTDB REST ────────────────────────────────────────────────────────
async function rtdbGet(path) {
  const r = await fetch(`${RTDB}/${path}.json`)
  if (!r.ok) throw new Error(`RTDB GET ${path}: HTTP ${r.status}`)
  return r.json()
}
async function rtdbPut(path, data) {
  const r = await fetch(`${RTDB}/${path}.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})
  if (!r.ok) throw new Error(`RTDB PUT: HTTP ${r.status}`)
  return r.json()
}
async function rtdbPatch(path, data) {
  const r = await fetch(`${RTDB}/${path}.json`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})
  if (!r.ok) throw new Error(`RTDB PATCH: HTTP ${r.status}`)
  return r.json()
}
async function rtdbDelete(path) {
  const r = await fetch(`${RTDB}/${path}.json`,{method:"DELETE"})
  if (!r.ok) throw new Error(`RTDB DELETE: HTTP ${r.status}`)
}

// ── File upload ──────────────────────────────────────────────────────
function handleUpload() {
  const file = $("fileInput").files[0]
  if (!file) { showToast("⚠ Selecione um arquivo primeiro","err"); return }
  const name = file.name.toLowerCase()
  if (name.endsWith(".xlsx")||name.endsWith(".xls")) readXLSX(file, true)
  else readCSV(file, true)
}

function readXLSX(file, saveCloud) {
  loading("Lendo XLSX…")
  const reader = new FileReader()
  reader.onload = e => {
    try {
      const wb   = XLSX.read(new Uint8Array(e.target.result),{type:"array",cellDates:false})
      const ws   = wb.Sheets[wb.SheetNames[0]]
      const rows = XLSX.utils.sheet_to_json(ws,{raw:true,defval:""})
      const cols = ["Destino ETA","Destino ATA","Destino ATD","Origem ETA","Origem ATA","Origem ATD"]
      for (const row of rows) for (const c of cols) if (row[c]!=="") row[c]=normalizeDate(row[c])
      processAndMaybeUpload(rows, saveCloud)
    } catch(err){ done(); showToast("❌ Erro XLSX: "+err.message,"err"); console.error(err) }
  }
  reader.readAsArrayBuffer(file)
}

function readCSV(file, saveCloud) {
  loading("Lendo CSV…")
  Papa.parse(file,{
    header:true, skipEmptyLines:true,
    transformHeader: h => (h||"").replace(/^\uFEFF/,"").trim(),
    complete: r => processAndMaybeUpload(r.data, saveCloud),
    error: e => { done(); showToast("❌ Erro CSV: "+e.message,"err") }
  })
}

async function processAndMaybeUpload(rows, saveCloud) {
  allRows = rows
  // ✅ Show table IMMEDIATELY — no waiting for cloud
  applyFilter()
  done()
  setStatus(`📊 ${rows.length} linhas lidas.`, "#4ade80")

  if (!saveCloud) return

  // Upload to cloud in background
  loading("Salvando na nuvem…")
  setSyncStatus("loading","Enviando…")
  try {
    await rtdbDelete("lh_csv_cache")
    const chunks = {}
    for (let i = 0; i * CHUNK < rows.length; i++) {
      chunks["chunk_"+String(i).padStart(3,"0")] = {
        chunk: i,
        data: JSON.stringify(rows.slice(i*CHUNK,(i+1)*CHUNK)),
        updated_at: new Date().toISOString()
      }
    }
    await rtdbPut("lh_csv_cache", chunks)
    setStatus(`✅ ${rows.length} linhas na nuvem!`, "#4ade80")
    setSyncStatus("ok","Online")
    showToast(`✅ ${rows.length} rotas enviadas!`,"ok")
  } catch(e) {
    console.error(e)
    setSyncStatus("err","Erro")
    showToast("❌ Erro ao enviar: "+e.message,"err")
  }
  done()
}

async function loadCloudCSV() {
  const data = await rtdbGet("lh_csv_cache")
  if (!data) { setStatus("Sem dados. Envie um arquivo.","#9aa0b8"); return }
  let combined = []
  for (const k of Object.keys(data).sort())
    combined = combined.concat(JSON.parse(data[k].data||"[]"))
  allRows = combined
  setStatus(`☁ ${allRows.length} linhas carregadas.`, "#60a5fa")
}

async function loadManual() {
  const data = await rtdbGet("lh_monitoramento")
  manualMap = {}
  if (data) for (const [k,val] of Object.entries(data)) manualMap[val.route_id||k] = val
  lastManualHash = JSON.stringify(manualMap)
}

// ── Polling ──────────────────────────────────────────────────────────
function startPolling() {
  if (pollTimer) clearInterval(pollTimer)
  pollTimer = setInterval(async () => {
    try {
      const data = await rtdbGet("lh_monitoramento")
      const nm = {}
      if (data) for (const [k,val] of Object.entries(data)) nm[val.route_id||k] = val
      const h = JSON.stringify(nm)
      if (h !== lastManualHash) { manualMap = nm; lastManualHash = h; render() }
      setSyncStatus("ok","Online")
    } catch(e) { setSyncStatus("err","Offline"); console.warn("Poll:",e) }
  }, POLL_MS)
}

// ── Filter / process ─────────────────────────────────────────────────
function applyFilter() {
  selectedDate = $("datePicker").value
  processData(allRows)
}

/**
 * =SEERRO(SORT(FILTER(
 *   {L \ Z \ AA \ AK};          Placa, DestinoATA, DestinoATD, Pacotes
 *   X="SPA1" *                  Destino
 *   INT(Y)=HOJE() *             INT(Destino ETA) = data ref
 *   E<>"RODOPENHA" *            Motorista
 *   L<>""                       Placa não vazia
 * );2;VERDADEIRO);"")           Ordena por Z (ATA) ASC
 */
function processData(rows) {
  if (!rows?.length) { filtered=[]; render(); return }
  filtered = []
  const autoUpdates = []   // {id} que precisam ser marcados como Concluída

  for (const src of rows) {
    const placa     = v(src,"Veículo de carga 1")||v(src,"Veículo de carga 2")
    const destino   = v(src,"Destino").toUpperCase()
    const etaDate   = normalizeDate(v(src,"Destino ETA")).substring(0,10)
    const motorista = v(src,"Motorista").toUpperCase()
    const ymsIn     = normalizeDate(v(src,"Destino ATA"))
    const ymsOut    = normalizeDate(v(src,"Destino ATD"))
    const pacotes   = v(src,"Pacotes")
    const id        = v(src,"Route ID")

    if (destino !== "SPA1")                                  continue
    if (etaDate !== selectedDate)                            continue
    if (motorista.includes("RODOPENHA"))                     continue
    if (!placa||placa.toLowerCase().includes("sem placa"))   continue

    // ── Auto-Concluída: YMS OUT preenchido → marca Concluída ────────
    if (ymsOut && ymsOut.trim()) {
      const cur = manualMap[id]?.status_patio || ""
      // Só auto-marca se ainda não foi definido manualmente como outra coisa
      if (cur !== "Concluída") {
        if (!manualMap[id]) manualMap[id] = {}
        manualMap[id].status_patio = "Concluída"
        manualMap[id].route_id     = id
        autoUpdates.push(id)
      }
    }

    filtered.push({ id, placa, ymsIn, ymsOut, pacotes })
  }

  filtered.sort((a,b) => {
    const ae = !a.ymsIn||!a.ymsIn.trim(), be = !b.ymsIn||!b.ymsIn.trim()
    if (ae&&be) return 0
    if (ae) return 1; if (be) return -1
    return a.ymsIn.localeCompare(b.ymsIn)
  })
  render()

  // Persiste as auto-marcações no Firebase em background (sem bloquear a UI)
  if (autoUpdates.length) {
    autoUpdates.forEach(id => {
      rtdbPatch(`lh_monitoramento/${encodeKey(id)}`, {
        route_id: id,
        status_patio: "Concluída",
        updated_at: new Date().toISOString()
      }).catch(e => console.warn("Auto-status save error:", e))
    })
  }
}

// ── Constants ────────────────────────────────────────────────────────
const DOCAS      = ["-","D1","D2","D3","D4","D5","D6","D7","D8","D9","D10"]
const STATUSES   = ["Aguardando Doca","Concluída","Descarga iniciada","Docada","Fos","Não Chegou","Bloqueada"]
const PERFIS     = ["Granel","Paletizada"]
const RTYPES     = ["—","MP","Pacotes"]
const CLS_MAP    = {
  "Concluída":"st-Concluida","Descarga iniciada":"st-Descarga",
  "Docada":"st-Docada","Fos":"st-Fos","Não Chegou":"st-NaoChegou",
  "Aguardando Doca":"st-Aguardando","Bloqueada":"st-Bloqueada"
}

function mkSel(opts, cur, id, field, extraClass="") {
  return `<select data-id="${id}" data-field="${field}" class="${extraClass}">${
    opts.map(o=>`<option${o===cur?" selected":""}>${o}</option>`).join("")
  }</select>`
}

// Botão HR INICIO: ativo → só o horário; inativo → label "Início"
function mkReversaBtn(id, m) {
  const time = m.reversa_hora || ""
  if (time) {
    return `<div class="btn-reversa active" data-id="${id}" title="Clique para apagar">${time}</div>`
  }
  return `<div class="btn-reversa" data-id="${id}" title="Registrar hora de início">Início</div>`
}

// Placa: nome + dois mini-toggles MP / PCT + pílula quando ativo
function placaHTML(placa, m, id) {
  const rtype = m.reversa_tipo || "—"

  const mpOn  = rtype === "MP"
  const pkOn  = rtype === "Pacotes"

  const toggles = `<div class="reversa-toggles">
    <span class="rtgl mp${mpOn?" on mp":""}" data-id="${id}" data-rtype="MP">MP</span>
    <span class="rtgl pkg${pkOn?" on pkg":""}" data-id="${id}" data-rtype="Pacotes">PCT</span>
  </div>`

  let tag = ""
  if (mpOn) tag = `<span class="reversa-tag mp">↩ REVERSA MP</span>`
  if (pkOn) tag = `<span class="reversa-tag pkg">↩ REV. PACOTES</span>`

  return `<div class="placa-wrap">
    <span class="placa">${placa}</span>
    ${toggles}
    ${tag}
  </div>`
}

// ── Render ───────────────────────────────────────────────────────────
function render() {
  let html="", concluidas=0, descarga=0, naoChegou=0, totalPacotes=0
  for (let i=0; i<filtered.length; i++) {
    const row = filtered[i]
    const id  = row.id
    const m   = manualMap[id]||{doca:"-",status_patio:"Não Chegou",perfil:"Granel",reversa_hora:"",reversa_tipo:"—"}
    const cls = CLS_MAP[m.status_patio]||"st-NaoChegou"
    if (m.status_patio==="Concluída")         concluidas++
    if (m.status_patio==="Descarga iniciada") descarga++
    if (m.status_patio==="Não Chegou")        naoChegou++
    totalPacotes += parseInt(row.pacotes)||0
    html += `<tr class="${cls}">
  <td><b>${i+1}</b></td>
  <td class="td-doca">${mkSel(DOCAS, m.doca, id,"doca")}</td>
  <td class="td-rev">${mkReversaBtn(id, m)}</td>
  <td class="td-placa">${placaHTML(row.placa, m, id)}</td>
  <td>${hhmm(row.ymsIn)}</td>
  <td>${hhmm(row.ymsOut)}</td>
  <td>${row.pacotes||"—"}</td>
  <td class="td-status">${mkSel(STATUSES,m.status_patio,id,"status_patio")}</td>
  <td class="td-perfil">${mkSel(PERFIS, m.perfil, id,"perfil")}</td>
</tr>`
  }
  if (!html) html = `<tr><td colspan="9" class="empty-msg">
    Nenhum registro SPA1 em <strong>${selectedDate}</strong><br>
    <small>Verifique a data ou envie um arquivo atualizado.</small></td></tr>`

  $("tbody").innerHTML          = html
  $("kpiTotal").textContent     = filtered.length
  $("kpiConcluida").textContent = concluidas
  $("kpiDescarga").textContent  = descarga
  $("kpiNaoChegou").textContent = naoChegou
  $("kpiPacotes").textContent   = totalPacotes.toLocaleString("pt-BR")
}

// ── Clear all ────────────────────────────────────────────────────────
async function clearAll() {
  if (!confirm("Apagar TODOS os dados do Firebase?\nEssa ação não pode ser desfeita.")) return
  loading("Apagando…")
  try {
    await rtdbDelete("lh_csv_cache")
    await rtdbDelete("lh_monitoramento")
    allRows=[]; filtered=[]; manualMap={}
    render(); setStatus("🗑 Dados apagados.","#f87171")
    showToast("🗑 Dados apagados.","err")
  } catch(e) { showToast("❌ "+e.message,"err"); console.error(e) }
  done()
}

// ── Export PNG (alta resolução) ───────────────────────────────────
async function exportImg() {
  loading("Gerando imagem em alta resolução…")
  try {
    const area   = $("printArea")
    const scroll = area.querySelector(".table-scroll")
    const table  = area.querySelector("table")
    const cs     = getComputedStyle(document.documentElement)
    const bg     = cs.getPropertyValue("--bg").trim() || "#0f1117"

    // 1. Substituir selects por spans legíveis
    const originals = []
    area.querySelectorAll("td select").forEach(sel => {
      const val  = sel.options[sel.selectedIndex]?.text || sel.value
      const span = document.createElement("span")
      span.textContent = val
      span.style.cssText = [
        "display:block","width:100%","text-align:center",
        "font-size:12px","font-family:'Barlow',sans-serif","font-weight:700",
        "color:inherit","overflow:hidden","text-overflow:ellipsis","white-space:nowrap"
      ].join(";")
      originals.push({ sel, parent: sel.parentNode, span })
      sel.parentNode.replaceChild(span, sel)
    })

    // 2. Expandir overflow ANTES de medir alturas
    const prevScrollO  = scroll.style.overflow
    const prevScrollH  = scroll.style.height
    const prevAreaW    = area.style.width
    const prevAreaO    = area.style.overflow

    scroll.style.overflow = "visible"
    scroll.style.height   = "auto"
    area.style.overflow   = "visible"

    // 3. Forçar largura completa
    const fullW = Math.max(area.scrollWidth, table ? table.scrollWidth : 900, 900)
    area.style.width = fullW + "px"

    // 4. Medir altura REAL depois de expandir (inclui todas as linhas)
    //    Adiciona padding extra no fundo para garantir que nada seja cortado
    const fullH = area.scrollHeight + 32

    const canvas = await html2canvas(area, {
      scale: 4,
      useCORS: true,
      allowTaint: true,
      backgroundColor: bg,
      scrollX: -(window.scrollX + area.getBoundingClientRect().left),
      scrollY: -(window.scrollY + area.getBoundingClientRect().top),
      windowWidth:  fullW,
      windowHeight: fullH,
      width:  fullW,
      height: fullH,
      logging: false,
      imageTimeout: 0,
      onclone: (doc) => {
        // Expandir overflow no clone também
        const cloneScroll = doc.querySelector(".table-scroll")
        if (cloneScroll) {
          cloneScroll.style.overflow = "visible"
          cloneScroll.style.height   = "auto"
        }
        const cloneArea = doc.getElementById("printArea")
        if (cloneArea) cloneArea.style.overflow = "visible"

        doc.querySelectorAll("td, th").forEach(el => {
          el.style.overflow     = "hidden"
          el.style.textOverflow = "ellipsis"
          el.style.whiteSpace   = "nowrap"
          el.style.fontSize     = "12px"
        })
        doc.querySelectorAll("thead th").forEach(el => {
          el.style.fontSize = "13px"
          el.style.padding  = "10px 6px"
        })
        doc.querySelectorAll("tbody td").forEach(el => {
          el.style.padding  = "7px 5px"
          el.style.fontSize = "12px"
        })
      }
    })

    // 5. Restaurar estado original
    scroll.style.overflow = prevScrollO
    scroll.style.height   = prevScrollH
    area.style.overflow   = prevAreaO
    area.style.width      = prevAreaW
    originals.forEach(({ sel, parent, span }) => {
      parent.replaceChild(sel, span)
    })

    // 6. Salvar como PNG
    const a = document.createElement("a")
    a.download = "monitoramento_" + selectedDate + ".png"
    a.href = canvas.toDataURL("image/png")
    a.click()

  } catch(e) {
    console.error(e)
    showToast("❌ Erro ao gerar imagem","err")
  }
  done()
}
</script>
</body>
</html>
