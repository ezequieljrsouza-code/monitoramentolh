.st-NaoChegou  select { background:#e07b00; color:#fff; border-color:rgba(255,255,255,.4); }

<body>

<div id="overlay"><div class="spin"></div><span id="overlayMsg">Carregando...</span></div>

<details class="controls-accordion" open>
  <summary>⚙️ Atualização de Dados e Arquivos CSV/XLSX</summary>
  <div class="controls">
    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
    <button id="btnUpload" class="btn btn-upload">⬆ Salvar na Nuvem</button>

  </div>
</details>

<div id="printArea">
  <div class="header">🚛 MONITORAMENTO LH — SPA1</div>

  <div class="date-row">
    <label>📅 Data de referência:</label>
    <input type="date" id="datePicker">
    <span id="dateInfo"></span>
  </div>

  <div class="dashboard">
    <div class="card">Total<span id="kpiTotal">0</span></div>
    <div class="card card-concluida">Concluídas<span id="kpiConcluida">0</span></div>
    <div class="card card-descarga">Descarga Iniciada<span id="kpiDescarga">0</span></div>
    <div class="card card-naochegou">Não Chegou<span id="kpiNaoChegou">0</span></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>DOCA</th><th>REVERSA</th><th>PLACA</th>
          <th>YMS IN</th><th>YMS OUT</th><th>PACOTES</th>
          <th>STATUS</th><th>PERFIL</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="9" class="empty-msg">Carregando dados do Firebase…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script type="module">
// ── Firebase Realtime Database (REST) ──────────────────────────────────────
// URL base do Realtime Database
const RTDB_URL = "https://monitoramento-rotas-spa1-default-rtdb.firebaseio.com"

// ── estado global ──────────────────────────────────────────────────────────
let allRows = [], filtered = [], manualMap = {}
let selectedDate = todayStr()
let realtimeInterval = null

const $ = id => document.getElementById(id)

// ── listeners de UI ────────────────────────────────────────────────────────
$("btnUpload").addEventListener("click",   handleUpload)
$("btnPrint").addEventListener("click",    exportImg)
$("btnClear").addEventListener("click",    clearAll)
$("datePicker").addEventListener("change", applyFilter)
$("tbody").addEventListener("change", e => {
  const { id, field } = e.target.dataset
  if (id && field) updateRTDB(id, field, e.target.value)
})

$("datePicker").value = selectedDate
updateDateInfo()

// ── inicialização ──────────────────────────────────────────────────────────
try {
  loading("Carregando dados…")
  await loadCloudCSV()
  await loadManual()
  applyFilter()
  done()
  startRealtime()
} catch(e) {
  done()
  setStatus("Erro Firebase: " + e.message, "red")
  console.error(e)
}

// ── helpers de data ────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date()
  return [d.getFullYear(), String(d.getMonth()+1).padStart(2,"0"), String(d.getDate()).padStart(2,"0")].join("-")
}

function loading(msg) { $("overlayMsg").textContent = msg || "Carregando…"; $("overlay").classList.add("show") }
function done()       { $("overlay").classList.remove("show") }
function setStatus(msg, color) { $("uploadStatus").textContent = msg; $("uploadStatus").style.color = color||"#444" }
function updateDateInfo() {
  $("dateInfo").textContent = $("datePicker").value === todayStr() ? "📌 Hoje" : "📆 " + $("datePicker").value
}
function v(obj, key) { const r = obj[key]; return (r == null) ? "" : String(r).trim() }

function normalizeDate(raw) {
  if (!raw && raw !== 0) return ""
  const s = String(raw).trim()
  if (!s || s === "nan") return ""
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.replace("T", " ")
  const dmy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:[T\s]+(\d{1,2}:\d{2}))?/)
  if (dmy) {
    const [, d, m, y, t] = dmy
    return `${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}` + (t ? " " + t + ":00" : " 00:00:00")
  }
  const mdy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:\s+(\d{1,2}:\d{2}))?/)
  if (mdy) {
    const [, m, d, y, t] = mdy
    return `${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}` + (t ? " " + t + ":00" : " 00:00:00")
  }
  if (/^\d+(\.\d+)?$/.test(s)) {
    const date = XLSX.SSF.parse_date_code(parseFloat(s))
    if (date) {
      return `${date.y}-${String(date.m).padStart(2,"0")}-${String(date.d).padStart(2,"0")} ` +
             `${String(date.H).padStart(2,"0")}:${String(date.M).padStart(2,"0")}:00`
    }
  }
  return s
}

// ── upload / leitura de arquivo ────────────────────────────────────────────
function handleUpload() {
  const file = $("fileInput").files[0]
  if (!file) { setStatus("⚠ Selecione um arquivo.", "orange"); return }
  const name = file.name.toLowerCase()
  if (name.endsWith(".xlsx") || name.endsWith(".xls")) readXLSX(file)
  else readCSV(file)
}

function readXLSX(file) {
  loading("Lendo XLSX…")
  const reader = new FileReader()
  reader.onload = e => {
    try {
      const wb   = XLSX.read(new Uint8Array(e.target.result), { type: "array", cellDates: false })
      const ws   = wb.Sheets[wb.SheetNames[0]]
      const rows = XLSX.utils.sheet_to_json(ws, { raw: true, defval: "" })
      const dateCols = ["Destino ETA","Destino ATA","Destino ATD","Origem ETA","Origem ATA","Origem ATD"]
      for (const row of rows) {
        for (const col of dateCols) {
          if (row[col] !== "") row[col] = normalizeDate(row[col])
        }
      }
      saveAndProcess(rows)
    } catch(err) { done(); setStatus("Erro XLSX: " + err.message, "red"); console.error(err) }
  }
  reader.readAsArrayBuffer(file)
}

function readCSV(file) {
  loading("Lendo CSV…")
  Papa.parse(file, {
    header: true, skipEmptyLines: true,
    transformHeader: h => (h||"").replace(/^\uFEFF/,"").trim(),
    complete: r => saveAndProcess(r.data),
    error: e => { done(); setStatus("Erro CSV: " + e.message, "red") }
  })
}

// ── Firebase Realtime Database (REST API) ──────────────────────────────────
async function rtdbGet(path) {
  const res = await fetch(`${RTDB_URL}/${path}.json`)
  if (!res.ok) throw new Error(`RTDB GET ${path}: ${res.status}`)
  return res.json()
}

async function rtdbPut(path, data) {
  const res = await fetch(`${RTDB_URL}/${path}.json`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  if (!res.ok) throw new Error(`RTDB PUT ${path}: ${res.status}`)
  return res.json()
}

async function rtdbPatch(path, data) {
  const res = await fetch(`${RTDB_URL}/${path}.json`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  if (!res.ok) throw new Error(`RTDB PATCH ${path}: ${res.status}`)
  return res.json()
}

async function rtdbDelete(path) {
  const res = await fetch(`${RTDB_URL}/${path}.json`, { method: "DELETE" })
  if (!res.ok) throw new Error(`RTDB DELETE ${path}: ${res.status}`)
}

// ── salvar CSV em nuvem (RTDB) ─────────────────────────────────────────────
const CHUNK_SIZE = 200
async function saveAndProcess(rows) {
  allRows = rows
  loading("Salvando no Firebase…")
  try {
    // apaga chunks antigos
    await rtdbDelete("lh_csv_cache")
    // salva em chunks
    const chunks = {}
    for (let i = 0; i * CHUNK_SIZE < rows.length; i++) {
      const key = "chunk_" + String(i).padStart(3,"0")
      chunks[key] = {
        chunk: i,
        data: JSON.stringify(rows.slice(i * CHUNK_SIZE, (i+1) * CHUNK_SIZE)),
        updated_at: new Date().toISOString()
      }
    }
    await rtdbPut("lh_csv_cache", chunks)
    setStatus("✅ " + rows.length + " linhas salvas!", "green")
  } catch(e) { console.error(e); setStatus("⚠ Erro: " + e.message, "red") }
  applyFilter()
  done()
}

async function loadCloudCSV() {
  try {
    const data = await rtdbGet("lh_csv_cache")
    if (!data) { setStatus("Sem dados. Faça upload do arquivo.", "#888"); return }
    let combined = []
    const keys = Object.keys(data).sort()
    for (const k of keys) {
      combined = combined.concat(JSON.parse(data[k].data || "[]"))
    }
    allRows = combined
    setStatus("☁ " + allRows.length + " linhas carregadas.", "#0066cc")
  } catch(e) { console.error(e); setStatus("Erro ao carregar: " + e.message, "red"); throw e }
}

// ── dados manuais (RTDB) ───────────────────────────────────────────────────
async function updateRTDB(id, field, value) {
  try {
    await rtdbPatch(`lh_monitoramento/${encodeKey(id)}`, {
      [field]: value,
      updated_at: new Date().toISOString()
    })
  } catch(e) { console.error("Erro ao salvar:", e) }
}

async function loadManual() {
  try {
    const data = await rtdbGet("lh_monitoramento")
    manualMap = {}
    if (data) {
      for (const [k, v] of Object.entries(data)) {
        manualMap[v.route_id || k] = v
      }
    }
  } catch(e) { console.error(e); throw e }
}

// Firebase não aceita '/', '.', '#', '$', '[', ']' em chaves
function encodeKey(id) { return String(id).replace(/[.#$[\]/]/g, "_") }

// ── polling para simular realtime ─────────────────────────────────────────
function startRealtime() {
  if (realtimeInterval) clearInterval(realtimeInterval)
  realtimeInterval = setInterval(async () => {
    try {
      const data = await rtdbGet("lh_monitoramento")
      const newMap = {}
      if (data) {
        for (const [k, v] of Object.entries(data)) {
          newMap[v.route_id || k] = v
        }
      }
      manualMap = newMap
      render()
    } catch(e) { console.error("Polling error:", e) }
  }, 10000) // a cada 10s
}

// ── filtro e processamento ─────────────────────────────────────────────────
function applyFilter() {
  selectedDate = $("datePicker").value
  updateDateInfo()
  processData(allRows)
}

/**
 * Critérios espelhando a fórmula:
 *   =SEERRO(SORT(FILTER(
 *     {L:L \ Z:Z \ AA:AA \ AK:AK};   → Veículo de carga 1, Destino ATA, Destino ATD, Pacotes
 *     X:X = "SPA1"                   → Destino = SPA1
 *     * INT(Y:Y) = HOJE()            → INT(Destino ETA) = data selecionada
 *     * E:E <> "RODOPENHA"           → Motorista <> RODOPENHA
 *     * L:L <> ""                    → Veículo de carga 1 não vazio
 *   ); 2; VERDADEIRO);"")
 *   Ordem: coluna 2 (Destino ATA) crescente
 */
function processData(rows) {
  if (!rows?.length) { filtered = []; render(); return }
  filtered = []
  for (const src of rows) {
    // Col L – Veículo de carga 1 (placa)
    const placa     = v(src, "Veículo de carga 1") || v(src, "Veículo de carga 2")
    // Col X – Destino
    const destino   = v(src, "Destino").toUpperCase()
    // Col Y – Destino ETA (INT = só a data)
    const etaRaw    = normalizeDate(v(src, "Destino ETA"))
    const etaDate   = etaRaw.substring(0, 10)            // INT(ETA) = data
    // Col E – Motorista
    const motorista = v(src, "Motorista").toUpperCase()
    // Col Z – Destino ATA (ymsIn)
    const ymsIn     = normalizeDate(v(src, "Destino ATA"))
    // Col AA – Destino ATD (ymsOut)
    const ymsOut    = normalizeDate(v(src, "Destino ATD"))
    // Col AK – Pacotes
    const pacotes   = v(src, "Pacotes")
    // Route ID
    const id        = v(src, "Route ID")

    // ── filtros da fórmula ──
    if (destino !== "SPA1")                              continue  // X = "SPA1"
    if (etaDate !== selectedDate)                        continue  // INT(Y) = data selecionada
    if (motorista.includes("RODOPENHA"))                 continue  // E <> "RODOPENHA"
    if (!placa || placa.toLowerCase().includes("sem placa")) continue  // L <> ""

    filtered.push({ id, placa, etaDate, ymsIn, ymsOut, pacotes })
  }

  // Ordenar por Destino ATA crescente (col 2 da fórmula); vazios por último
  filtered.sort((a, b) => {
    const aEmpty = !a.ymsIn || a.ymsIn.trim() === ""
    const bEmpty = !b.ymsIn || b.ymsIn.trim() === ""
    if (aEmpty && bEmpty) return 0
    if (aEmpty) return 1
    if (bEmpty) return -1
    return a.ymsIn.localeCompare(b.ymsIn)
  })
  render()
}

// ── constantes de opções ───────────────────────────────────────────────────
const DOCAS    = ["-","D1","D2","D3","D4","D5","D6","D7","D8","D9","D10"]
const STATUSES = ["Aguardando Doca","Concluída","Descarga iniciada","Docada","Fos","Não Chegou","Bloqueada"]
const PERFIS   = ["Granel","Paletizada"]
const REVERSAS = ["Não","Sim"]
const CLS_MAP  = {
  "Concluída":        "st-Concluida",
  "Descarga iniciada":"st-Descarga",
  "Docada":           "st-Docada",
  "Fos":              "st-Fos",
  "Não Chegou":       "st-NaoChegou",
  "Aguardando Doca":  "st-Aguardando",
  "Bloqueada":        "st-Bloqueada"
}

function mkSel(opts, cur, id, field) {
  return `<select data-id="${id}" data-field="${field}">${
    opts.map(o => `<option${o===cur?" selected":""}>${o}</option>`).join("")
  }</select>`
}
function hhmm(dt) { return String(dt).substring(11,16) || "—" }

// ── renderização ───────────────────────────────────────────────────────────
function render() {
  let html = "", concluidas = 0, descarga = 0, naoChegou = 0

  for (let i = 0; i < filtered.length; i++) {
    const row = filtered[i]
    const id  = row.id
    const m   = manualMap[id] || { doca:"-", reversa:"Não", status_patio:"Aguardando Doca", perfil:"Granel" }
    const cls = CLS_MAP[m.status_patio] || "st-Aguardando"

    if (m.status_patio === "Concluída")         concluidas++
    if (m.status_patio === "Descarga iniciada") descarga++
    if (m.status_patio === "Não Chegou")        naoChegou++

    html += `
<tr class="${cls}">
  <td>${i+1}</td>
  <td>${mkSel(DOCAS,    m.doca,         id,"doca")}</td>
  <td>${mkSel(REVERSAS, m.reversa,      id,"reversa")}</td>
  <td class="placa">${row.placa}</td>
  <td>${hhmm(row.ymsIn)}</td>
  <td>${hhmm(row.ymsOut)}</td>
  <td>${row.pacotes}</td>
  <td>${mkSel(STATUSES, m.status_patio, id,"status_patio")}</td>
  <td>${mkSel(PERFIS,   m.perfil,       id,"perfil")}</td>
</tr>`
  }

  if (!html) html = `<tr><td colspan="9" class="empty-msg">
    Nenhum registro com destino SPA1 em <strong>${selectedDate}</strong>.<br>
    Verifique a data selecionada ou faça upload de um arquivo atualizado.</td></tr>`

  $("tbody").innerHTML         = html
  $("kpiTotal").textContent    = filtered.length
  $("kpiConcluida").textContent= concluidas
  $("kpiDescarga").textContent = descarga
  $("kpiNaoChegou").textContent= naoChegou
}

// ── limpar tudo ────────────────────────────────────────────────────────────
async function clearAll() {
  if (!confirm("Apagar CSV e dados manuais do Firebase?\nEssa ação não pode ser desfeita.")) return
  loading("Apagando…")
  try {
    await rtdbDelete("lh_csv_cache")
    await rtdbDelete("lh_monitoramento")
    allRows = []; filtered = []; manualMap = {}
    render(); setStatus("🗑 Dados apagados.", "red")
  } catch(e) { setStatus("Erro ao apagar: " + e.message, "red"); console.error(e) }
  done()
}

// ── exportar imagem ────────────────────────────────────────────────────────
async function exportImg() {
  loading("Gerando imagem…")
  const area = document.getElementById("printArea")
  const canvas = await html2canvas(area, {
    scale: 2,
    useCORS: true,
    backgroundColor: "#f0f2f5",
    scrollX: 0,
    scrollY: -window.scrollY,
    windowWidth: area.scrollWidth,
    width: area.scrollWidth,
    height: area.scrollHeight
  })
  const a = document.createElement("a")
  a.download = "monitoramento_" + selectedDate + ".jpg"
  a.href = canvas.toDataURL("image/jpeg", 0.95)
  a.click(); done()
}
</script>
